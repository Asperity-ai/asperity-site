<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" role="img" aria-labelledby="ba-t ba-d">
  <title id="ba-t">Programmed-once vs. adaptive control flow</title>
  <desc id="ba-d">Side-by-side comparison of two robotic control paradigms. Left: a rigid programmed-once loop cycling between Plan, Execute, and Repeat. Right: an adaptive flow with Perceive, Plan, Execute, Detect anomaly, and rust-highlighted Adapt and Recover branches that feed back into Plan.</desc>
  <g font-family="'IBM Plex Mono', ui-monospace, monospace" fill="#1A1A1A" stroke-linecap="round" stroke-linejoin="round">

    <!-- section labels -->
    <g fill="#6B6862" font-size="9">
      <text x="40" y="30">§ control loop · comparison</text>
    </g>

    <!-- vertical divider -->
    <line x1="540" y1="60" x2="540" y2="390" stroke="#DFDBD2" stroke-width="0.85" stroke-dasharray="2 4"/>

    <!-- ======= LEFT: programmed once ======= -->
    <g>
      <text x="60" y="70" font-size="11" fill="#383530">A.</text>
      <text x="80" y="70" font-size="13">Programmed once</text>
      <text x="60" y="86" font-size="9" fill="#6B6862">fixed cycle · no feedback</text>

      <!-- triangle loop nodes -->
      <g fill="none" stroke="#1A1A1A" stroke-width="1.4">
        <rect x="220" y="130" width="120" height="46"/>
        <rect x="320" y="280" width="120" height="46"/>
        <rect x="100" y="280" width="120" height="46"/>
      </g>

      <g font-size="12">
        <text x="280" y="158" text-anchor="middle">Plan</text>
        <text x="380" y="308" text-anchor="middle">Execute</text>
        <text x="160" y="308" text-anchor="middle">Repeat</text>
      </g>

      <!-- arrows around the triangle (rigid) -->
      <g stroke="#1A1A1A" stroke-width="1.3" fill="none">
        <!-- Plan -> Execute -->
        <path d="M324 176 L376 274"/>
        <path d="M373 264 L378 278 L364 274"/>
        <!-- Execute -> Repeat -->
        <path d="M320 303 L222 303"/>
        <path d="M232 298 L218 303 L232 308"/>
        <!-- Repeat -> Plan -->
        <path d="M168 274 L236 176"/>
        <path d="M226 180 L238 174 L240 188"/>
      </g>

      <!-- footnote -->
      <g font-size="10" fill="#6B6862">
        <text x="100" y="360">if conditions drift,</text>
        <text x="100" y="374">the loop drifts with them.</text>
      </g>
    </g>

    <!-- ======= RIGHT: adaptive ======= -->
    <g transform="translate(560 0)">
      <text x="20" y="70" font-size="11" fill="#383530">B.</text>
      <text x="40" y="70" font-size="13">Adaptive</text>
      <text x="20" y="86" font-size="9" fill="#6B6862">sensing · branching · recovery</text>

      <!-- nodes: Perceive, Plan, Execute, Detect anomaly, Adapt, Recover -->
      <g fill="none" stroke="#1A1A1A" stroke-width="1.4">
        <rect x="20" y="150" width="92" height="40"/>   <!-- Perceive -->
        <rect x="140" y="150" width="78" height="40"/>  <!-- Plan -->
        <rect x="246" y="150" width="92" height="40"/>  <!-- Execute -->
        <rect x="366" y="150" width="120" height="40"/> <!-- Detect anomaly -->
      </g>
      <!-- rust-highlighted nodes -->
      <g fill="none" stroke="#B5371E" stroke-width="1.5">
        <rect x="246" y="270" width="92" height="40"/>  <!-- Adapt -->
        <rect x="140" y="270" width="92" height="40"/>  <!-- Recover -->
      </g>

      <g font-size="12">
        <text x="66" y="175" text-anchor="middle">Perceive</text>
        <text x="179" y="175" text-anchor="middle">Plan</text>
        <text x="292" y="175" text-anchor="middle">Execute</text>
        <text x="426" y="175" text-anchor="middle">Detect</text>
        <text x="426" y="188" text-anchor="middle" font-size="10" fill="#383530">anomaly</text>
        <text x="292" y="295" text-anchor="middle" fill="#B5371E">Adapt</text>
        <text x="186" y="295" text-anchor="middle" fill="#B5371E">Recover</text>
      </g>

      <!-- forward ink arrows -->
      <g stroke="#1A1A1A" stroke-width="1.3" fill="none">
        <!-- Perceive -> Plan -->
        <path d="M112 170 L138 170"/>
        <path d="M132 166 L142 170 L132 174"/>
        <!-- Plan -> Execute -->
        <path d="M218 170 L244 170"/>
        <path d="M238 166 L248 170 L238 174"/>
        <!-- Execute -> Detect anomaly -->
        <path d="M338 170 L364 170"/>
        <path d="M358 166 L368 170 L358 174"/>
      </g>

      <!-- decision dots (rust) at branch points -->
      <g fill="#B5371E" stroke="none">
        <circle cx="426" cy="190" r="2.4"/>
        <circle cx="186" cy="270" r="2.4"/>
        <circle cx="179" cy="190" r="2.4"/>
      </g>

      <!-- rust branches: Detect anomaly -> Adapt -->
      <g stroke="#B5371E" stroke-width="1.5" fill="none">
        <path d="M426 190 L426 250 Q426 270 406 270 L340 270"/>
        <path d="M348 266 L338 270 L348 274"/>
        <!-- Adapt -> Recover -->
        <path d="M246 290 L234 290"/>
        <path d="M240 286 L230 290 L240 294"/>
        <!-- Recover -> Plan (loop back, rust) -->
        <path d="M186 270 L186 220 Q186 210 179 210 L179 192"/>
        <path d="M175 200 L179 190 L183 200"/>
      </g>

      <!-- side annotation -->
      <g font-size="10" fill="#6B6862">
        <text x="20" y="360">deviation triggers</text>
        <text x="20" y="374">a new plan, not a stop.</text>
      </g>
      <g font-size="9" fill="#B5371E">
        <text x="246" y="334">value-add path</text>
      </g>
    </g>

    <!-- corner ticks -->
    <g stroke="#6B6862" stroke-width="0.75" fill="none">
      <path d="M30 14 L30 8 L36 8"/>
      <path d="M1070 14 L1070 8 L1064 8"/>
      <path d="M30 400 L30 406 L36 406"/>
      <path d="M1070 400 L1070 406 L1064 406"/>
    </g>
  </g>
</svg>
