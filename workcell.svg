<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="wc-t wc-d">
  <title id="wc-t">Robotic workcell schematic</title>
  <desc id="wc-d">Side-view schematic of an industrial robotic workcell: a 6-axis arm on a base with an end-effector and wrist-mounted force/torque sensor, a workpiece on a fixture, an overhead camera with dashed field-of-view cone, and a controller box. Engineering drawing aesthetic in ink with rust accents on the AI-relevant sensing elements.</desc>
  <g font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" fill="#1A1A1A" stroke-linecap="round" stroke-linejoin="round">

    <!-- ground rule -->
    <line x1="40" y1="430" x2="760" y2="430" stroke="#6B6862" stroke-width="0.85"/>
    <g stroke="#DFDBD2" stroke-width="0.75">
      <line x1="60" y1="435" x2="50" y2="448"/>
      <line x1="110" y1="435" x2="100" y2="448"/>
      <line x1="160" y1="435" x2="150" y2="448"/>
      <line x1="210" y1="435" x2="200" y2="448"/>
      <line x1="260" y1="435" x2="250" y2="448"/>
      <line x1="310" y1="435" x2="300" y2="448"/>
      <line x1="360" y1="435" x2="350" y2="448"/>
      <line x1="410" y1="435" x2="400" y2="448"/>
      <line x1="460" y1="435" x2="450" y2="448"/>
      <line x1="510" y1="435" x2="500" y2="448"/>
      <line x1="560" y1="435" x2="550" y2="448"/>
      <line x1="610" y1="435" x2="600" y2="448"/>
      <line x1="660" y1="435" x2="650" y2="448"/>
      <line x1="710" y1="435" x2="700" y2="448"/>
    </g>

    <!-- robot base (J1) -->
    <g fill="none" stroke="#1A1A1A" stroke-width="1.4">
      <path d="M205 430 L205 392 Q205 386 211 386 L279 386 Q285 386 285 392 L285 430"/>
      <line x1="218" y1="386" x2="218" y2="430"/>
      <line x1="272" y1="386" x2="272" y2="430"/>
      <!-- shoulder pivot J2 -->
      <circle cx="245" cy="378" r="11" stroke="#1A1A1A" stroke-width="1.4"/>
      <circle cx="245" cy="378" r="2.5" fill="#1A1A1A" stroke="none"/>
    </g>

    <!-- upper arm to elbow -->
    <g fill="none" stroke="#1A1A1A" stroke-width="1.4">
      <path d="M239 372 L335 232"/>
      <path d="M252 384 L348 244"/>
      <!-- elbow joint J3 -->
      <circle cx="342" cy="238" r="10"/>
      <circle cx="342" cy="238" r="2.2" fill="#1A1A1A" stroke="none"/>
    </g>

    <!-- forearm to wrist -->
    <g fill="none" stroke="#1A1A1A" stroke-width="1.4">
      <path d="M349 232 L470 215"/>
      <path d="M351 247 L470 230"/>
      <!-- wrist J4/J5 -->
      <circle cx="478" cy="223" r="8"/>
    </g>

    <!-- F/T sensor (rust) -->
    <g stroke="#B5371E" stroke-width="1.4" fill="none">
      <rect x="486" y="216" width="22" height="16" rx="1.2"/>
      <line x1="491" y1="220" x2="503" y2="220"/>
      <line x1="491" y1="224" x2="503" y2="224"/>
      <line x1="491" y1="228" x2="503" y2="228"/>
    </g>

    <!-- end-effector (gripper) -->
    <g fill="none" stroke="#1A1A1A" stroke-width="1.4">
      <line x1="508" y1="224" x2="524" y2="224"/>
      <path d="M524 214 L524 234"/>
      <path d="M524 216 L538 210 L538 220 L526 222"/>
      <path d="M524 232 L538 238 L538 228 L526 226"/>
    </g>

    <!-- workpiece + fixture -->
    <g fill="none" stroke="#1A1A1A" stroke-width="1.4">
      <rect x="548" y="402" width="100" height="28" />
      <rect x="572" y="382" width="52" height="20"/>
      <line x1="548" y1="430" x2="540" y2="430"/>
      <line x1="648" y1="430" x2="656" y2="430"/>
    </g>

    <!-- camera stand -->
    <g fill="none" stroke="#1A1A1A" stroke-width="1.4">
      <line x1="690" y1="430" x2="690" y2="120"/>
      <line x1="690" y1="120" x2="600" y2="120"/>
      <rect x="568" y="108" width="34" height="26"/>
      <path d="M568 116 L558 110 L558 132 L568 126 Z"/>
    </g>

    <!-- camera cone (rust dashed) -->
    <g stroke="#B5371E" stroke-width="1" fill="none" stroke-dasharray="4 3">
      <line x1="562" y1="132" x2="574" y2="382"/>
      <line x1="562" y1="132" x2="622" y2="382"/>
    </g>

    <!-- controller box -->
    <g fill="none" stroke="#1A1A1A" stroke-width="1.4">
      <rect x="78" y="372" width="78" height="58"/>
      <line x1="78" y1="386" x2="156" y2="386"/>
      <circle cx="86" cy="379" r="1.6" fill="#1A1A1A" stroke="none"/>
      <circle cx="93" cy="379" r="1.6" fill="#B5371E" stroke="none"/>
      <line x1="88" y1="398" x2="146" y2="398"/>
      <line x1="88" y1="406" x2="138" y2="406"/>
      <line x1="88" y1="414" x2="128" y2="414"/>
      <line x1="88" y1="422" x2="146" y2="422"/>
      <!-- cable to robot -->
      <path d="M156 410 Q180 414 198 422 Q210 426 215 430" stroke-dasharray="3 2"/>
    </g>

    <!-- leader lines + labels -->
    <g stroke="#383530" stroke-width="0.85" fill="none">
      <line x1="300" y1="270" x2="240" y2="160"/>
      <circle cx="300" cy="270" r="1.6" fill="#383530" stroke="none"/>
      <line x1="498" y1="216" x2="498" y2="170"/>
      <line x1="498" y1="170" x2="608" y2="170"/>
      <circle cx="498" cy="216" r="1.6" fill="#B5371E" stroke="none"/>
      <line x1="585" y1="120" x2="585" y2="88"/>
      <line x1="598" y1="392" x2="660" y2="362"/>
      <circle cx="598" cy="392" r="1.6" fill="#383530" stroke="none"/>
      <line x1="117" y1="372" x2="117" y2="346"/>
    </g>

    <g fill="#1A1A1A">
      <text x="120" y="155">Robot arm — UR / FANUC / ABB</text>
      <text x="612" y="174" fill="#B5371E">F/T sensor</text>
      <text x="556" y="82">Camera</text>
      <text x="660" y="358">Workpiece</text>
      <text x="78" y="341">Controller</text>
    </g>

    <!-- section label -->
    <g fill="#6B6862" font-size="9">
      <text x="40" y="34">§ workcell · side elevation</text>
      <text x="40" y="48">scale n.t.s.</text>
    </g>

    <!-- corner ticks -->
    <g stroke="#6B6862" stroke-width="0.75" fill="none">
      <path d="M30 20 L30 14 L36 14"/>
      <path d="M770 20 L770 14 L764 14"/>
      <path d="M30 480 L30 486 L36 486"/>
      <path d="M770 480 L770 486 L764 486"/>
    </g>
  </g>
</svg>
